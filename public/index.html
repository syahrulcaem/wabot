<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asisten Kantor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bbd 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .header-info h1 { font-size: 1.1rem; font-weight: 700; }
    .header-info p  { font-size: .78rem; opacity: .85; margin-top: 2px; }
    .btn-reset {
      margin-left: auto;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: .8rem;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-reset:hover { background: rgba(255,255,255,.35); }

    /* ── Help bar ── */
    .help-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 8px 20px;
      font-size: .78rem;
      color: #555;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .help-bar span { display: flex; align-items: center; gap: 4px; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Bubble ── */
    .bubble-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .bubble-wrap.user { flex-direction: row-reverse; }

    .bubble-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .bubble-icon.bot  { background: #1a73e8; color: #fff; }
    .bubble-icon.user { background: #25d366; color: #fff; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: .9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.bot {
      background: #fff;
      color: #222;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .bubble.user {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* typing indicator */
    .bubble.typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 18px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* timestamp */
    .ts {
      font-size: .68rem;
      color: #999;
      padding: 0 4px;
      align-self: flex-end;
    }

    /* ── Quick suggestions ── */
    #suggestions {
      display: flex;
      gap: 8px;
      padding: 0 20px 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .chip {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: .8rem;
      cursor: pointer;
      color: #1a73e8;
      transition: background .15s, border-color .15s;
    }
    .chip:hover { background: #e8f0fe; border-color: #1a73e8; }

    /* ── Input bar ── */
    #input-bar {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      border: 1px solid #d0d7de;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: .9rem;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color .2s;
      font-family: inherit;
    }
    #msg:focus { border-color: #1a73e8; }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #1a73e8;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #1558c0; }
    #send-btn:active:not(:disabled) { transform: scale(.93); }
    #send-btn:disabled { background: #b0c4e8; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="avatar">🏢</div>
  <div class="header-info">
    <h1>Asisten Kantor</h1>
    <p>Direktori karyawan &amp; kehadiran internal</p>
  </div>
  <button class="btn-reset" onclick="resetChat()">🔄 Reset Chat</button>
</header>

<div class="help-bar">
  <span>💡 Contoh:</span>
  <span>👤 "Siapa Budi di IT?"</span>
  <span>🏬 "Siapa saja di HR?"</span>
  <span>📍 "Andi di kantor hari ini?"</span>
  <span>📋 "Tampilkan semua karyawan"</span>
</div>

<div id="chat"></div>

<div id="suggestions">
  <button class="chip" onclick="send('Tampilkan semua karyawan')">📋 Semua karyawan</button>
  <button class="chip" onclick="send('Siapa saja di divisi IT?')">💻 Tim IT</button>
  <button class="chip" onclick="send('Siapa saja di divisi HR?')">👥 Tim HR</button>
  <button class="chip" onclick="send('Siapa yang WFO hari ini?')">🏢 WFO hari ini</button>
</div>

<div id="input-bar">
  <textarea id="msg" rows="1" placeholder="Ketik pesan…" autofocus></textarea>
  <button id="send-btn" onclick="sendFromInput()" title="Kirim">➤</button>
</div>

<script>
  const chatEl  = document.getElementById('chat');
  const msgEl   = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');

  // Buat session ID unik per tab browser
  const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 10);

  // Sambutan awal
  appendBubble('bot', '👋 Halo! Saya **Asisten Kantor**.\nSaya siap membantu Anda mencari info karyawan, divisi, dan status kehadiran.\n\nSilakan ketik pertanyaan atau pilih contoh di atas.');

  // Auto-resize textarea
  msgEl.addEventListener('input', () => {
    msgEl.style.height = 'auto';
    msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
  });

  // Enter = kirim, Shift+Enter = baris baru
  msgEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); }
  });

  function sendFromInput() {
    const text = msgEl.value.trim();
    if (!text) return;
    msgEl.value = '';
    msgEl.style.height = 'auto';
    send(text);
  }

  async function send(text) {
    appendBubble('user', text);
    hideSuggestions();
    const typingId = appendTyping();
    setSending(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId: SESSION_ID }),
      });
      const data = await res.json();
      removeTyping(typingId);
      if (res.ok) {
        appendBubble('bot', data.reply);
      } else {
        appendBubble('bot', '❌ ' + (data.error || 'Terjadi kesalahan. Coba lagi.'));
      }
    } catch {
      removeTyping(typingId);
      appendBubble('bot', '❌ Tidak dapat terhubung ke server. Pastikan server sudah berjalan.');
    } finally {
      setSending(false);
      msgEl.focus();
    }
  }

  async function resetChat() {
    try {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: SESSION_ID }),
      });
    } catch { /* abaikan */ }
    chatEl.innerHTML = '';
    showSuggestions();
    appendBubble('bot', '🔄 Riwayat percakapan telah direset.\nSilakan mulai percakapan baru!');
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function appendBubble(who, text) {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${who}`;

    const icon = document.createElement('div');
    icon.className = `bubble-icon ${who}`;
    icon.textContent = who === 'bot' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${who}`;
    bubble.textContent = text; // textContent aman dari XSS

    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = now();

    if (who === 'bot') {
      wrap.appendChild(icon);
      wrap.appendChild(bubble);
      wrap.appendChild(ts);
    } else {
      wrap.appendChild(ts);
      wrap.appendChild(bubble);
      wrap.appendChild(icon);
    }

    chatEl.appendChild(wrap);
    scrollBottom();
  }

  function appendTyping() {
    const id = 'typing-' + Date.now();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot';
    wrap.id = id;

    const icon = document.createElement('div');
    icon.className = 'bubble-icon bot';
    icon.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot typing';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function setSending(flag) {
    sendBtn.disabled = flag;
    msgEl.disabled   = flag;
  }

  function scrollBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function hideSuggestions() {
    document.getElementById('suggestions').style.display = 'none';
  }

  function showSuggestions() {
    document.getElementById('suggestions').style.display = 'flex';
  }

  function now() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
